  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["MovingCompany", "LocalBusiness", "Organization"],
    "name": "{{businessName}}",
    "legalName": "{{legalName}}",
    "url": "{{siteUrl}}",
    "logo": "{{siteUrl}}/images/logo_trimmed.png",
    "image": "{{siteUrl}}/images/og-image.jpg",
    "telephone": "{{phoneTel}}",
    "email": "{{email}}",
    "taxID": "{{registrationNumber}}",
    "sameAs": [
      "{{whatsapp}}"{{#if facebook}},
      "{{facebook}}"{{/if}}{{#if instagram}},
      "{{instagram}}"{{/if}}
    ],
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{street}}",
      "addressLocality": "{{city}}",
      "postalCode": "{{postcode}}",
      "addressCountry": "GB"
    },
    "openingHours": "Mo-Su 00:00-23:59",
    "areaServed": {
      "@type": "GeoCircle",
      "geoMidpoint": {
        "@type": "GeoCoordinates",
        "latitude": 52.4862,
        "longitude": -1.8904
      },
      "geoRadius": "50000"
    },
    "priceRange": "££"
  }
  </script>
