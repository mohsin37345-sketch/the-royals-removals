  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MovingCompany",
    "name": "{{businessName}}",
    "url": "{{siteUrl}}",
    "telephone": "{{phone}}",
    "email": "{{email}}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{street}}",
      "addressLocality": "{{city}}",
      "postalCode": "{{postcode}}",
      "addressCountry": "GB"
    },
    "openingHours": "Mo-Su 07:00-20:00",
    "areaServed": {
      "@type": "GeoCircle",
      "geoMidpoint": {
        "@type": "GeoCoordinates",
        "latitude": 52.4862,
        "longitude": -1.8904
      },
      "geoRadius": "50000"
    },
    "priceRange": "££"
  }
  </script>
