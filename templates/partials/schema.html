  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["MovingCompany", "LocalBusiness", "Organization"],
    "name": "{{businessName}}",
    "legalName": "{{legalName}}",
    "url": "{{siteUrl}}",
    "logo": "{{siteUrl}}/images/hero_removals_van.png",
    "image": "{{siteUrl}}/images/hero_removals_van.png",
    "telephone": "{{phone}}",
    "email": "{{email}}",
    "taxID": "{{registrationNumber}}",
    "sameAs": [
      "{{whatsapp}}",
      "{{facebook}}",
      "{{instagram}}"
    ],
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{street}}",
      "addressLocality": "{{city}}",
      "postalCode": "{{postcode}}",
      "addressCountry": "GB"
    },
    "openingHours": "Mo-Su 07:00-20:00",
    "areaServed": {
      "@type": "GeoCircle",
      "geoMidpoint": {
        "@type": "GeoCoordinates",
        "latitude": 52.4862,
        "longitude": -1.8904
      },
      "geoRadius": "50000"
    },
    "priceRange": "££"
  }
  </script>
